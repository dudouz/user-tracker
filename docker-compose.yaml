services:
  db:
    image: postgres:16
    container_name: user-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_tracker
    ports:
      - "5454:5432" # Avoid collision with other services in my vps
    volumes:
      - user_tracker_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d user_tracker"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  user_tracker_db_data:
